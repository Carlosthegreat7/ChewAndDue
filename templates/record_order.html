<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chew & Due - Record Order</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { padding: 10px; align-items: flex-start; }
        .dashboard-container { width: 100%; max-width: 500px; margin: 0 auto; }
        .nav-bar { display: flex; align-items: center; margin-bottom: 20px; padding: 10px; gap: 15px;}
        .nav-bar h2 { margin: 0; font-size: 20px; }
        
        /* Specific Back Button Style */
        .back-btn { background: none; border: none; font-size: 24px; color: var(--primary-start); cursor: pointer; padding: 0; box-shadow: none; width: auto; font-weight: bold;}
        .back-btn:active { transform: none; }
        
        .card { background: var(--card-bg); padding: 30px 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card h3 { margin-bottom: 25px; color: var(--primary-start); font-size: 22px; text-align: center;}
        
        select, input[type="number"] { width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 16px; margin-bottom: 20px; background: #fafbfc; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: var(--text-main); }
    </style>
</head>
<body>

<div class="dashboard-container">
    
    <div class="nav-bar">
        <a href="/dashboard" style="text-decoration: none;">
            <button class="back-btn">&larr;</button>
        </a>
        <h2>New Order</h2>
    </div>

    <div class="card">
        <h3>Record Customer Order</h3>
        <form action="/add_order" method="POST">
            
            <label for="customer">Customer</label>
            <select name="customer_id" id="customer" required>
                <option value="" disabled selected>Select a customer...</option>
                {% for customer in customers %}
                    <option value="{{ customer.id }}">{{ customer.name }}</option>
                {% endfor %}
            </select>

            <label for="menu_item">Menu Item</label>
            <select name="menu_item_id" id="menu_item" required>
                <option value="" disabled selected>Select food...</option>
                {% for item in menu_items %}
                    <option value="{{ item.id }}">{{ item.name }} (₱{{ item.price }})</option>
                {% endfor %}
            </select>

            <label for="qty">Quantity</label>
            <input type="number" name="quantity" id="qty" value="1" min="1" required>
            
            <button type="submit" style="margin-top: 10px;">Add Order to Tab</button>
        </form>
    </div>

</div>

</body>
</html>
