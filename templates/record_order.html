<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chew & Due - Record Order</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { padding: 10px; align-items: flex-start; }
        .dashboard-container { width: 100%; max-width: 500px; margin: 0 auto; }
        .nav-bar { display: flex; align-items: center; margin-bottom: 20px; padding: 10px; gap: 15px;}
        .nav-bar h2 { margin: 0; font-size: 20px; }
        
        /* Specific Back Button Style */
        .back-btn { background: none; border: none; font-size: 24px; color: var(--primary-start); cursor: pointer; padding: 0; box-shadow: none; width: auto; font-weight: bold;}
        .back-btn:active { transform: none; }
        
        .card { 
            background: var(--card-bg); 
            padding: 30px 20px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            
            /* Initial Animation for the whole card */
            opacity: 0;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .card h3 { margin-bottom: 25px; color: var(--primary-start); font-size: 22px; text-align: center;}
        
        select, input[type="number"] { width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 16px; margin-bottom: 20px; background: #fafbfc; transition: all 0.3s ease; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: var(--text-main); opacity: 0; animation: slideUpFade 0.5s ease forwards; }
        
        /* Staggered entry for form fields */
        form > *:nth-child(1) { animation-delay: 0.1s; } /* Label 1 */
        form > *:nth-child(2) { animation-delay: 0.15s; } /* Select 1 */
        form > *:nth-child(3) { animation-delay: 0.2s; } /* Label 2 */
        form > *:nth-child(4) { animation-delay: 0.25s; } /* Select 2 */
        form > *:nth-child(5) { animation-delay: 0.3s; } /* Label 3 */
        form > *:nth-child(6) { animation-delay: 0.35s; } /* Input 3 */
        form > button { animation-delay: 0.4s; opacity: 0; animation: slideUpFade 0.5s ease forwards; }

        input:focus, select:focus {
            border-color: var(--primary-start);
            box-shadow: 0 0 0 4px rgba(12, 150, 156, 0.1);
            background: #fff;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    
    <div class="nav-bar">
        <a href="{{ url_for('main.dashboard') }}" style="text-decoration: none;">
            <button class="back-btn">&larr;</button>
        </a>
        <h2>New Order</h2>
    </div>

    <div class="card">
        <h3>Record Customer Order</h3>
        <form action="{{ url_for('admin.add_order') }}" method="POST">
            
            <label for="customer">Customer</label>
            <select name="customer_id" id="customer" required>
                <option value="" disabled selected>Select a customer...</option>
                {% for customer in customers %}
                    <option value="{{ customer.id }}">{{ customer.name }}</option>
                {% endfor %}
            </select>

            <label for="menu_item">Menu Item</label>
            <select name="menu_item_id" id="menu_item" required>
                <option value="" disabled selected>Select food...</option>
                {% for item in menu_items %}
                    <option value="{{ item.id }}">{{ item.name }} (₱{{ item.price }})</option>
                {% endfor %}
            </select>

            <label for="qty">Quantity</label>
            <input type="number" name="quantity" id="qty" value="1" min="1" required>
            
            <button type="submit" style="margin-top: 10px;">Add Order to Tab</button>
        </form>
    </div>

</div>

</body>
</html>
